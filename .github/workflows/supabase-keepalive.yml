name: Supabase Keepalive

on:
  schedule:
    # Every 6 hours. Any interval under 7 days prevents inactivity pauses.
    - cron: "0 */6 * * *"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  ping:
    runs-on: ubuntu-latest
    env:
      SUPABASE_URL: ${{ secrets.SUPABASE_PROJECT_URL }}
      SUPABASE_API_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY || secrets.SUPABASE_ANON_KEY }}
      SUPABASE_TABLE: ${{ vars.SUPABASE_KEEPALIVE_TABLE }}

    steps:
      - name: Validate required configuration
        shell: bash
        run: |
          set -euo pipefail

          if [ -z "${SUPABASE_URL}" ]; then
            echo "Missing secret: SUPABASE_PROJECT_URL"
            exit 1
          fi

          if [ -z "${SUPABASE_API_KEY}" ]; then
            echo "Missing secret: SUPABASE_SERVICE_ROLE_KEY or SUPABASE_ANON_KEY"
            exit 1
          fi

          if [ -z "${SUPABASE_TABLE}" ]; then
            echo "Missing repo variable: SUPABASE_KEEPALIVE_TABLE"
            exit 1
          fi

      - name: Keep Supabase project active via REST query
        shell: bash
        run: |
          set -euo pipefail

          ENDPOINT="${SUPABASE_URL%/}/rest/v1/${SUPABASE_TABLE}"
          STATUS=$(curl -sS -o /tmp/keepalive_response.txt -w "%{http_code}" \
            --get "${ENDPOINT}" \
            --data-urlencode "select=*" \
            --data-urlencode "limit=1" \
            -H "apikey: ${SUPABASE_API_KEY}" \
            -H "Authorization: Bearer ${SUPABASE_API_KEY}" \
            -H "Accept: application/json")

          echo "HTTP status: ${STATUS}"

          if [ "${STATUS}" -lt 200 ] || [ "${STATUS}" -ge 300 ]; then
            echo "Keepalive request failed. Response:"
            cat /tmp/keepalive_response.txt
            exit 1
          fi

          echo "Supabase keepalive ping succeeded."
